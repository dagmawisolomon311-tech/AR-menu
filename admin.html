<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dukem Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
        --bg-dark: #0f0a08;
        --card-bg: #1a1310;
        --border-color: #2e2019;
        --primary-orange: #ea580c;
        --text-white: #fbf7f5;
        --text-muted: #a3948c;
        --accent-gold: #f59e0b;
        --danger: #dc2626;
        --success: #16a34a;
        --font-sans: 'Plus Jakarta Sans', sans-serif;
    }
    body { font-family: var(--font-sans); background: var(--bg-dark); color: var(--text-white); margin: 0; padding: 0;}
    header { background: rgba(15, 10, 8, 0.9); padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;}
    header a { text-decoration: none; color: var(--primary-orange); font-weight: 600; }
    #dashboardArea { display: none; }
    .admin-container { padding: 40px 20px; max-width: 800px; margin: auto; }
    
    .form-card { background: var(--card-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 40px; }
    .form-group { margin-bottom: 15px; }
    input, select { width: 100%; padding: 14px; background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 8px; color: white; font-family: var(--font-sans); box-sizing: border-box;}
    input::placeholder { color: var(--text-muted); }
    .save-btn { background: var(--primary-orange); color: white; padding: 14px 20px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: 0.3s;}
    .save-btn:hover { background: #c2410c; }
    .cancel-btn { background: transparent; color: var(--text-muted); padding: 14px; border: 1px solid var(--text-muted); border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; display: none; }
    
    .menu-item { background: var(--card-bg); padding: 20px; margin: 15px 0; border-radius: 12px; border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;}
    .item-info { flex: 1; min-width: 200px; }
    .item-title { font-weight: bold; font-size: 18px; color: var(--accent-gold); margin-bottom: 5px;}
    .item-meta { font-size: 13px; color: var(--text-muted); }
    .badge { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 12px; font-size: 11px; margin-left: 10px; color: var(--text-white); }
    .hidden-badge { background: #7f1d1d; color: #fca5a5; }

    .action-btns { display: flex; gap: 8px; }
    .action-btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; color: white; }
    .edit-btn { background: #2563eb; }
    .hide-btn { background: #475569; }
    .show-btn { background: var(--success); }
    .delete-btn { background: var(--danger); }
    
    .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    .login-box { background: var(--card-bg); padding: 40px; border-radius: 16px; border: 1px solid var(--border-color); width: 90%; max-width: 400px; text-align: center; }
    .login-box h2 { margin-top: 0; color: var(--text-white); margin-bottom: 25px; }
  </style>
</head>
<body>

  <div class="login-overlay" id="loginScreen">
    <div class="login-box">
      <h2>⚙️ Dukem Admin</h2>
      <div class="form-group"><input type="text" id="usernameInput" placeholder="Username"></div>
      <div class="form-group"><input type="password" id="passwordInput" placeholder="Password"></div>
      <button class="save-btn" id="loginBtn">Secure Login</button>
    </div>
  </div>

  <div id="dashboardArea">
    <header>
      <div style="font-weight: bold; font-size: 20px; font-family: 'Playfair Display', serif;">⚙️ Dukem Dashboard</div>
      <nav><a href="index.html">← Back to Live Site</a></nav>
    </header>

    <div class="admin-container">
      <div class="form-card">
        <h2 id="form-title" style="margin-top: 0; margin-bottom: 20px; font-family: 'Playfair Display', serif;">Add New Menu Item</h2>
        
        <div class="form-group">
          <select id="category">
            <option value="Food">🍽️ Food</option>
            <option value="Drink">🥤 Drink</option>
          </select>
        </div>

        <div class="form-group"><input type="text" id="name" placeholder="Item Name (e.g. Tinsae Special Kurt)"></div>
        <div class="form-group"><input type="text" id="desc" placeholder="Description"></div>
        <div class="form-group"><input type="text" id="price" placeholder="Price (e.g. 1200 ETB)"></div>
        <div class="form-group"><input type="text" id="img" placeholder="Image File (e.g. kurt.jpg)"></div>
        <div class="form-group"><input type="text" id="model" placeholder="3D Model File (e.g. kurt.glb)"></div>
        
        <button class="save-btn" id="add-btn">Save to Database</button>
        <button class="cancel-btn" id="cancel-btn" onclick="cancelEdit()">Cancel Edit</button>
      </div>

      <h2 style="font-family: 'Playfair Display', serif; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Current Database</h2>
      <div id="menu-list" style="margin-top: 20px;">Loading database...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC11AWjH6Ftv17VNmD4Q7zXeekgQ6-OaGc",
      authDomain: "bistro-reality.firebaseapp.com",
      projectId: "bistro-reality",
      storageBucket: "bistro-reality.firebasestorage.app",
      messagingSenderId: "3168029834",
      appId: "1:3168029834:web:ce82c2ad96dab6bc0d7173"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const menuCollection = collection(db, "menuItems");

    const ALLOWED_USER = "test";       
    const ALLOWED_PASS = "dagi";   

    let editingId = null; // Tracks if we are editing an existing item

    document.getElementById("loginBtn").addEventListener("click", () => {
      const user = document.getElementById("usernameInput").value;
      const pass = document.getElementById("passwordInput").value;

      if (user === ALLOWED_USER && pass === ALLOWED_PASS) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("dashboardArea").style.display = "block";
        loadMenu(); 
      } else {
        alert("Incorrect username or password!");
      }
    });

    document.getElementById("add-btn").addEventListener("click", async () => {
      const btn = document.getElementById("add-btn");
      const category = document.getElementById("category").value;
      const name = document.getElementById("name").value;
      const desc = document.getElementById("desc").value;
      const price = document.getElementById("price").value;
      const img = document.getElementById("img").value;
      const model = document.getElementById("model").value;

      if(!name || !price) return alert("Please fill in the item name and price.");

      btn.innerText = "Saving to Firebase...";
      btn.style.opacity = "0.7";

      try {
        if (editingId) {
            // UPDATE EXISTING ITEM
            await updateDoc(doc(db, "menuItems", editingId), {
                Category: category, Name: name, Description: desc, 
                Price: price, Image: img, Model: model
            });
            alert("Item updated successfully!");
        } else {
            // ADD NEW ITEM (default hidden: false)
            await addDoc(menuCollection, { 
                Category: category, Name: name, Description: desc, 
                Price: price, Image: img, Model: model, hidden: false 
            });
            alert("New item added securely!");
        }
        
        window.cancelEdit(); // Resets the form
        loadMenu(); 
      } catch (error) {
        alert("ERROR SAVING: " + error.message);
        btn.innerText = editingId ? "Update Item" : "Save to Database";
        btn.style.opacity = "1";
      }
    });

    async function loadMenu() {
      try {
        const querySnapshot = await getDocs(menuCollection);
        const list = document.getElementById("menu-list");
        list.innerHTML = "";
        
        if(querySnapshot.empty) {
            list.innerHTML = "<p style='color: var(--text-muted);'>No items found.</p>";
            return;
        }

        querySnapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const itemCategory = data.Category || "Food";
          const isHidden = data.hidden === true;
          
          // Escape quotes for the onclick function parameters
          const safeName = data.Name ? data.Name.replace(/'/g, "\\'") : "";
          const safeDesc = data.Description ? data.Description.replace(/'/g, "\\'") : "";
          const safeImg = data.Image ? data.Image.replace(/'/g, "\\'") : "";
          const safeModel = data.Model ? data.Model.replace(/'/g, "\\'") : "";

          list.innerHTML += `
            <div class="menu-item" style="opacity: ${isHidden ? '0.5' : '1'}; border-color: ${isHidden ? '#7f1d1d' : 'var(--border-color)'}">
              <div class="item-info">
                <div class="item-title">
                  ${data.Name} - ${data.Price}
                  <span class="badge">${itemCategory}</span>
                  ${isHidden ? '<span class="badge hidden-badge">HIDDEN</span>' : ''}
                </div>
                <div class="item-meta">${data.Description || 'No description'}</div>
              </div>
              
              <div class="action-btns">
                <button class="action-btn edit-btn" onclick="window.startEdit('${docSnap.id}', '${itemCategory}', '${safeName}', '${safeDesc}', '${data.Price}', '${safeImg}', '${safeModel}')">Edit</button>
                <button class="action-btn ${isHidden ? 'show-btn' : 'hide-btn'}" onclick="window.toggleVisibility('${docSnap.id}', ${isHidden})">${isHidden ? 'Unhide' : 'Hide'}</button>
                <button class="action-btn delete-btn" onclick="window.deleteItem('${docSnap.id}')">Delete</button>
              </div>
            </div>
          `;
        });
      } catch (error) {
         document.getElementById("menu-list").innerHTML = "<p>Error loading database: " + error.message + "</p>";
      }
    }

    // --- GLOBALLY EXPOSED FUNCTIONS FOR BUTTONS ---

    window.startEdit = (id, category, name, desc, price, img, model) => {
        editingId = id;
        document.getElementById("form-title").innerText = "✏️ Edit Menu Item";
        document.getElementById("category").value = category;
        document.getElementById("name").value = name;
        document.getElementById("desc").value = desc;
        document.getElementById("price").value = price;
        document.getElementById("img").value = img;
        document.getElementById("model").value = model;
        
        document.getElementById("add-btn").innerText = "Update Item";
        document.getElementById("cancel-btn").style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' }); // Scroll up to the form
    };

    window.cancelEdit = () => {
        editingId = null;
        document.getElementById("form-title").innerText = "Add New Menu Item";
        document.getElementById("category").value = "Food";
        document.getElementById("name").value = "";
        document.getElementById("desc").value = "";
        document.getElementById("price").value = "";
        document.getElementById("img").value = "";
        document.getElementById("model").value = "";
        
        document.getElementById("add-btn").innerText = "Save to Database";
        document.getElementById("add-btn").style.opacity = "1";
        document.getElementById("cancel-btn").style.display = "none";
    };

    window.toggleVisibility = async (id, isCurrentlyHidden) => {
        try {
            await updateDoc(doc(db, "menuItems", id), { hidden: !isCurrentlyHidden });
            loadMenu(); // Reload to reflect changes
        } catch (error) {
            alert("Error updating visibility: " + error.message);
        }
    };

    window.deleteItem = async (id) => {
      if(confirm("Are you sure you want to permanently remove this item?")) {
        try {
          await deleteDoc(doc(db, "menuItems", id));
          loadMenu();
        } catch (error) {
          alert("ERROR DELETING: " + error.message);
        }
      }
    };
  </script>
</body>
</html>
