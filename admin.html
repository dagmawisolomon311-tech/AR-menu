<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dukem Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
        --bg-dark: #0f0a08;
        --card-bg: #1a1310;
        --border-color: #2e2019;
        --primary-orange: #ea580c;
        --text-white: #fbf7f5;
        --text-muted: #a3948c;
        --font-sans: 'Plus Jakarta Sans', sans-serif;
    }
    body { font-family: var(--font-sans); background: var(--bg-dark); color: var(--text-white); margin: 0; padding: 0;}
    header { background: rgba(15, 10, 8, 0.9); padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;}
    header a { text-decoration: none; color: var(--primary-orange); font-weight: 600; }
    
    .admin-container { padding: 40px 20px; max-width: 800px; margin: auto; }
    
    .form-card { background: var(--card-bg); padding: 30px; border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 40px; }
    .form-group { margin-bottom: 15px; }
    input, select { width: 100%; padding: 14px; background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 8px; color: white; font-family: var(--font-sans); box-sizing: border-box;}
    input::placeholder { color: var(--text-muted); }
    
    .save-btn { background: var(--primary-orange); color: white; padding: 14px 20px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; transition: 0.3s;}
    .save-btn:hover { background: #c2410c; }
    .cancel-btn { background: transparent; color: var(--text-muted); padding: 14px; border: 1px solid var(--text-muted); border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; margin-top: 10px; display: none; }
    
    /* List styling */
    .admin-list { display: flex; flex-direction: column; gap: 15px; }
    .admin-item { background: var(--card-bg); border: 1px solid var(--border-color); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;}
    .item-info h3 { margin: 0 0 5px 0; font-size: 18px; color: var(--primary-orange); }
    .item-info p { margin: 0; font-size: 14px; color: var(--text-muted); }
    .item-actions button { margin-left: 10px; padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
    .btn-edit { background: #f59e0b; color: #000; }
    .btn-hide { background: #4b5563; color: white; }
    .btn-delete { background: #dc2626; color: white; }
  </style>
</head>
<body>

    <header>
        <div class="logo">Dukem Admin Dashboard</div>
        <a href="index.html">← Back to Website</a>
    </header>

    <div class="admin-container">
        
        <!-- Add / Edit Form -->
        <div class="form-card">
            <h2 id="form-title">Add New Dish</h2>
            
            <div class="form-group">
                <select id="category">
                    <option value="Food">Food</option>
                    <option value="Drink">Drink</option>
                </select>
            </div>
            
            <div class="form-group"><input type="text" id="name" placeholder="English Name (e.g. Tere Siga)"></div>
            <div class="form-group"><input type="text" id="nameAm" placeholder="Amharic Name (e.g. ጥሬ ሥጋ)"></div>
            
            <div class="form-group"><input type="text" id="desc" placeholder="English Description"></div>
            <div class="form-group"><input type="text" id="descAm" placeholder="Amharic Description (ማብራሪያ)"></div>
            
            <div class="form-group"><input type="text" id="price" placeholder="Price (e.g. 480 ETB)"></div>
            <div class="form-group"><input type="text" id="img" placeholder="Image File URL (e.g. kurt.jpg)"></div>
            <div class="form-group"><input type="text" id="model" placeholder="3D Model File URL (e.g. kurt.glb)"></div>
            
            <button class="save-btn" id="save-btn">Save Dish</button>
            <button class="cancel-btn" id="cancel-btn">Cancel Edit</button>
            <p id="status-msg" style="color: var(--success); text-align: center; display: none;">Saved successfully!</p>
        </div>

        <!-- List of Existing Items -->
        <h2>Current Menu Items</h2>
        <div class="admin-list" id="admin-menu-list">
            <p>Loading items...</p>
        </div>

    </div>

    <!-- Firebase Dynamic Data Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyC11AWjH6Ftv17VNmD4Q7zXeekgQ6-OaGc",
          authDomain: "bistro-reality.firebaseapp.com",
          projectId: "bistro-reality",
          storageBucket: "bistro-reality.firebasestorage.app",
          messagingSenderId: "3168029834",
          appId: "1:3168029834:web:ce82c2ad96dab6bc0d7173"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let editingId = null; // Keeps track of if we are editing an existing item

        // Form Fields
        const catInput = document.getElementById("category");
        const nameInput = document.getElementById("name");
        const nameAmInput = document.getElementById("nameAm");
        const descInput = document.getElementById("desc");
        const descAmInput = document.getElementById("descAm");
        const priceInput = document.getElementById("price");
        const imgInput = document.getElementById("img");
        const modelInput = document.getElementById("model");
        const saveBtn = document.getElementById("save-btn");
        const cancelBtn = document.getElementById("cancel-btn");
        const statusMsg = document.getElementById("status-msg");

        // Load Menu Items
        async function loadAdminMenu() {
            const listContainer = document.getElementById("admin-menu-list");
            listContainer.innerHTML = "";
            const querySnapshot = await getDocs(collection(db, "menuItems"));
            
            if(querySnapshot.empty) {
                listContainer.innerHTML = "<p>No items in database.</p>";
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const item = docSnap.data();
                const id = docSnap.id;
                
                const visibilityText = item.hidden ? "Unhide" : "Hide";
                const visibilityStyle = item.hidden ? "opacity: 0.5;" : "";

                const itemHTML = `
                    <div class="admin-item" style="${visibilityStyle}">
                        <div class="item-info">
                            <h3>${item.Name} / ${item.NameAm || "No Amharic"}</h3>
                            <p>${item.Price} | ${item.Category}</p>
                        </div>
                        <div class="item-actions">
                            <button class="btn-hide" onclick="toggleHide('${id}', ${item.hidden || false})">${visibilityText}</button>
                            <button class="btn-delete" onclick="deleteItem('${id}')">Delete</button>
                        </div>
                    </div>
                `;
                listContainer.innerHTML += itemHTML;
            });
        }

        // Save Button Logic (Handles both Adding and Editing)
        saveBtn.addEventListener("click", async () => {
            if(!nameInput.value || !priceInput.value) {
                alert("Please fill in at least the English name and price.");
                return;
            }

            saveBtn.innerText = "Saving...";

            const itemData = {
                Category: catInput.value,
                Name: nameInput.value,
                NameAm: nameAmInput.value, // Saves Amharic Name
                Description: descInput.value,
                DescriptionAm: descAmInput.value, // Saves Amharic Description
                Price: priceInput.value,
                Image: imgInput.value,
                Model: modelInput.value,
                hidden: false
            };

            try {
                if(editingId) {
                    await updateDoc(doc(db, "menuItems", editingId), itemData);
                } else {
                    await addDoc(collection(db, "menuItems"), itemData);
                }
                
                statusMsg.style.display = "block";
                setTimeout(() => statusMsg.style.display = "none", 3000);
                
                resetForm();
                loadAdminMenu();
            } catch (error) {
                console.error("Error saving:", error);
                alert("Error saving item to database.");
            }
        });

        // Delete Item
        window.deleteItem = async function(id) {
            if(confirm("Are you sure you want to delete this dish permanently?")) {
                await deleteDoc(doc(db, "menuItems", id));
                loadAdminMenu();
            }
        }

        // Hide/Unhide Item (Useful for skipping items in index.html)
        window.toggleHide = async function(id, currentStatus) {
            await updateDoc(doc(db, "menuItems", id), {
                hidden: !currentStatus
            });
            loadAdminMenu();
        }

        // Reset form to blank
        function resetForm() {
            editingId = null;
            nameInput.value = ""; nameAmInput.value = "";
            descInput.value = ""; descAmInput.value = "";
            priceInput.value = ""; imgInput.value = ""; modelInput.value = "";
            saveBtn.innerText = "Save Dish";
            cancelBtn.style.display = "none";
            document.getElementById("form-title").innerText = "Add New Dish";
        }

        cancelBtn.addEventListener("click", resetForm);

        // Run on load
        loadAdminMenu();
    </script>
</body>
</html>
