<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Bistro Reality</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo">🍽 Bistro Reality</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="admin.html">⚙️ Admin</a>
    </nav>
</header>

<section class="hero">
    <h1>Experience Food in Augmented Reality</h1>
    <p>View your meal in 3D before ordering.</p>
</section>

<section class="menu">
    <h2>Popular Dishes</h2>
    <div class="cards" id="menu-container">
        <p style="text-align:center; width:100%;">Loading fresh menu from database...</p>
    </div>
</section>

<script src="script.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

    // Your unique Firebase credentials
    const firebaseConfig = {
      apiKey: "AIzaSyC11AWjH6Ftv17VNmD4Q7zXeekgQ6-OaGc",
      authDomain: "bistro-reality.firebaseapp.com",
      projectId: "bistro-reality",
      storageBucket: "bistro-reality.firebasestorage.app",
      messagingSenderId: "3168029834",
      appId: "1:3168029834:web:ce82c2ad96dab6bc0d7173"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Fetch food items dynamically from Firestore
    async function loadPublicMenu() {
        const container = document.getElementById("menu-container");
        container.innerHTML = ""; 

        try {
            const querySnapshot = await getDocs(collection(db, "menuItems"));
            
            if (querySnapshot.empty) {
                container.innerHTML = "<p style='text-align:center; width:100%;'>No items found. Go to the Admin Dashboard to add dishes!</p>";
                return;
            }

            querySnapshot.forEach((doc) => {
                const item = doc.data();
                const cardHtml = `
                    <div class="card">
                        <img src="${item.Image}" alt="${item.Name}">
                        <h3>${item.Name}</h3>
                        <p>${item.Description}</p>
                        <div class="bottom">
                            <span>$${item.Price}</span>
                            <button onclick="viewAR('${item.Model}')">View in AR</button>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        } catch (error) {
            console.error("Database loading error:", error);
            container.innerHTML = "<p style='text-align:center; width:100%;'>Error loading menu database.</p>";
        }
    }

    // Trigger loader on startup
    loadPublicMenu();
</script>

</body>
</html>
