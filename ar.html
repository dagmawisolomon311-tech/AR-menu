<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bistro Reality AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        html, body {
            margin: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            /* Prevents the browser from refreshing when pulling down */
            overscroll-behavior-y: contain; 
        }
        #loading {
            position: fixed;
            left: 0; top: 0; width: 100%; height: 100%;
            background: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            z-index: 999;
        }
        #close {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border: none;
            background: #ff5722;
            color: white;
            font-size: 18px;
            border-radius: 10px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loading">Loading AR...</div>
    <button id="close">Close</button>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        
        <a-assets id="assets-container"></a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model 
                id="food-model"
                position="0 0 0" 
                scale="20 20 20" 
                rotation="0 0 0">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        // --- 1. Load the Model ---
        const urlParams = new URLSearchParams(window.location.search);
        const modelName = urlParams.get('model') || 'Avocado.glb';
        
        const assetsContainer = document.getElementById('assets-container');
        const foodModelEntity = document.getElementById('food-model');

        const assetItem = document.createElement('a-asset-item');
        assetItem.setAttribute('id', 'dynamic-food-asset');
        assetItem.setAttribute('src', modelName); 
        assetsContainer.appendChild(assetItem);

        foodModelEntity.setAttribute('src', '#dynamic-food-asset');

        // --- 2. Handle Loading Screen & Close Button ---
        const sceneEl = document.querySelector("a-scene");
        sceneEl.addEventListener("ready", () => document.getElementById("loading").style.display = "none");
        sceneEl.addEventListener("targetFound", () => document.getElementById("loading").style.display = "none");
        sceneEl.addEventListener("arReady", () => document.getElementById("loading").style.display = "none");

        document.getElementById("close").onclick = () => window.location.href = "index.html";

        // --- 3. CUSTOM SCREEN-WIDE TOUCH CONTROLS ---
        let isDragging = false;
        let previousPosition = { x: 0, y: 0 };
        let initialPinchDistance = 0;
        let initialScale = 20;

        // Listen for when fingers touch the screen
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                // One finger = rotation
                isDragging = true;
                previousPosition = { x: e.touches[0].pageX, y: e.touches[0].pageY };
            } else if (e.touches.length === 2) {
                // Two fingers = zoom (scale)
                isDragging = false;
                initialPinchDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                // Get the current scale before zooming
                const currentScale = foodModelEntity.getAttribute('scale');
                initialScale = currentScale.x;
            }
        });

        // Listen for fingers dragging across the screen
        window.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                // Calculate how far the finger moved
                const deltaX = e.touches[0].pageX - previousPosition.x;
                const deltaY = e.touches[0].pageY - previousPosition.y;
                
                const currentRotation = foodModelEntity.getAttribute('rotation');
                
                // Spin the model
                foodModelEntity.setAttribute('rotation', {
                    x: currentRotation.x - deltaY * 0.5,
                    y: currentRotation.y + deltaX * 0.5,
                    z: currentRotation.z
                });

                previousPosition = { x: e.touches[0].pageX, y: e.touches[0].pageY };
            } else if (e.touches.length === 2) {
                // Calculate new distance between two fingers
                const currentDistance = Math.hypot(
                    e.touches[0].pageX - e.touches[1].pageX,
                    e.touches[0].pageY - e.touches[1].pageY
                );
                
                // Adjust scale based on pinch
                const pinchScale = currentDistance / initialPinchDistance;
                let newScale = initialScale * pinchScale;
                
                // Prevent zooming in too close or out too far
                if (newScale < 5) newScale = 5;
                if (newScale > 60) newScale = 60;

                foodModelEntity.setAttribute('scale', `${newScale} ${newScale} ${newScale}`);
            }
        });

        // Stop rotating when finger lifts off
        window.addEventListener('touchend', () => {
            isDragging = false;
        });
    </script>
</body>
</html>
