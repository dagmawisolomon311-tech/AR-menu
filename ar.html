<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bistro Reality AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        html, body {
            margin: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        #loading {
            position: fixed;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-family: sans-serif;
            z-index: 999;
        }
        #close {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border: none;
            background: #ff5722;
            color: white;
            font-size: 18px;
            border-radius: 10px;
            z-index: 1000;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="loading">
        <div>Loading AR Scene...</div>
        <div style="font-size: 14px; margin-top: 10px; color: #ccc;">Please allow camera access</div>
    </div>

    <button id="close">Close Menu</button>

    <a-scene mindar-image="imageTargetSrc: targets/targets.mind;"

        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        
        <a-assets id="assets-container">
            </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model 
                id="food-model"
                position="0 0 0" 
                scale="0.5 0.5 0.5" 
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 12000">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        // 1. Parse the model name from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const modelName = urlParams.get('model') || 'Avocado.glb'; // Fallback to Avocado if missing
        
        const assetsContainer = document.getElementById('assets-container');
        const foodModelEntity = document.getElementById('food-model');

        // 2. Dynamically create the asset item pointing to your models folder
        const assetItem = document.createElement('a-asset-item');
        assetItem.setAttribute('id', 'dynamic-food-asset');
        assetItem.setAttribute('src', `../models/${modelName}`);
        assetsContainer.appendChild(assetItem);

        // 3. Link the model entity to the freshly loaded asset
        foodModelEntity.setAttribute('src', '#dynamic-food-asset');

        // Hide loading screen once MindAR is ready
        document.querySelector("a-scene").addEventListener("arReady", () => {
            document.getElementById("loading").style.display = "none";
        });

        // Error handling if AR fails to load
        document.querySelector("a-scene").addEventListener("arError", () => {
            alert("Failed to start AR. Make sure you are on HTTPS and allowed camera permissions.");
        });

        // Close button handler
        document.getElementById("close").onclick = () => {
            window.location.href = "../index.html";
        };
    </script>
</body>
</html>
