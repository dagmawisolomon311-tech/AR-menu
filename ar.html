<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Bistro Reality AR</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        html, body { margin: 0; overflow: hidden; width: 100%; height: 100%; touch-action: none; }
        #loading { position: fixed; left: 0; top: 0; width: 100%; height: 100%; background: black; color: white; display: flex; justify-content: center; align-items: center; font-size: 22px; z-index: 999; }
        #close { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 30px; border: none; background: #ff5722; color: white; font-size: 18px; border-radius: 10px; z-index: 1000; }
    </style>

    <script>
                AFRAME.registerComponent('touch-gestures', {
            init: function () {
                this.isDragging = false;
                this.previousPosition = { x: 0, y: 0 };
                this.initialPinchDistance = 0;
                // CHANGED: Lowered from 20 to 1 so giant models start at a normal size
                this.initialScale = 1; 

                this.onTouchStart = this.onTouchStart.bind(this);
                this.onTouchMove = this.onTouchMove.bind(this);
                this.onTouchEnd = this.onTouchEnd.bind(this);
                // ... (rest of init stays the same)
            },
            
            // ... (onTouchStart stays the same)
            
            onTouchMove: function(e) {
                e.preventDefault(); 
                // ... (rotation code stays the same)
                
                } else if (e.touches.length === 2) {
                    const currentDistance = Math.hypot(
                        e.touches[0].pageX - e.touches[1].pageX,
                        e.touches[0].pageY - e.touches[1].pageY
                    );
                    const pinchRatio = currentDistance / this.initialPinchDistance;
                    let newScale = this.initialScale * pinchRatio;
                    
                    // CHANGED: Expanded the limits so you can shrink it really small or make it big
                    if (newScale < 0.1) newScale = 0.1;
                    if (newScale > 100) newScale = 100;
                    
                    this.el.object3D.scale.set(newScale, newScale, newScale);
                }
            },
            // ...

            
            onTouchEnd: function() {
                this.isDragging = false;
            }
        });
    </script>
</head>
<body>

    <div id="loading">Loading AR...</div>
    <button id="close">Close</button>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        
        <a-assets id="assets-container"></a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

                <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model 
                id="food-model"
                position="0 0 0" 
                scale="1 1 1"    rotation="0 0 0"
                touch-gestures>
            </a-gltf-model>
        </a-entity>

    </a-scene>

    <script>
        // Load the chosen model dynamically
        const urlParams = new URLSearchParams(window.location.search);
        const modelName = urlParams.get('model') || 'Avocado.glb';
        
        const assetsContainer = document.getElementById('assets-container');
        const foodModelEntity = document.getElementById('food-model');

        const assetItem = document.createElement('a-asset-item');
        assetItem.setAttribute('id', 'dynamic-food-asset');
        assetItem.setAttribute('src', modelName); 
        assetsContainer.appendChild(assetItem);

        foodModelEntity.setAttribute('src', '#dynamic-food-asset');

        // Handle loading screen logic
        const sceneEl = document.querySelector("a-scene");
        sceneEl.addEventListener("ready", () => document.getElementById("loading").style.display = "none");
        sceneEl.addEventListener("targetFound", () => document.getElementById("loading").style.display = "none");
        sceneEl.addEventListener("arReady", () => document.getElementById("loading").style.display = "none");

        // Close button redirects back to the menu
        document.getElementById("close").onclick = () => window.location.href = "index.html";
    </script>
</body>
</html>
