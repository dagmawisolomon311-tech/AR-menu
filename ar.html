<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bistro Reality AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    <style>
        html, body {
            margin: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        #loading {
            position: fixed;
            left: 0; top: 0; width: 100%; height: 100%;
            background: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            z-index: 999;
        }
        #close {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            border: none;
            background: #ff5722;
            color: white;
            font-size: 18px;
            border-radius: 10px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="loading">
        Loading AR...
    </div>

    <button id="close">Close</button>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        gesture-detector>
        
        <a-assets id="assets-container"></a-assets>

        <a-camera 
            position="0 0 0" 
            look-controls="enabled: false"
            cursor="fuse: false; rayOrigin: mouse;" 
            raycaster="objects: .clickable">
        </a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model 
                id="food-model"
                position="0 0 0" 
                scale="20 20 20" 
                rotation="0 0 0"
                class="clickable"
                gesture-handler="minScale: 5; maxScale: 50">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        // Parse the model from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const modelName = urlParams.get('model') || 'Avocado.glb';
        
        const assetsContainer = document.getElementById('assets-container');
        const foodModelEntity = document.getElementById('food-model');

        // Dynamically create the asset
        const assetItem = document.createElement('a-asset-item');
        assetItem.setAttribute('id', 'dynamic-food-asset');
        assetItem.setAttribute('src', modelName); 
        assetsContainer.appendChild(assetItem);

        // Link asset to the model element
        foodModelEntity.setAttribute('src', '#dynamic-food-asset');

        // Hide loading screen when MindAR is fully ready
        const sceneEl = document.querySelector("a-scene");

        sceneEl.addEventListener("ready", () => {
            document.getElementById("loading").style.display = "none";
        });

        // Fallback: Just in case the event names vary, hide it if target is found
        sceneEl.addEventListener("targetFound", () => {
            document.getElementById("loading").style.display = "none";
        });

        // Hide loading screen when ready
        document.querySelector("a-scene").addEventListener("arReady", () => {
            document.getElementById("loading").style.display = "none";
        });

        // Go back home when closed
        document.getElementById("close").onclick = () => {
            window.location.href = "index.html"; 
        };
    </script>
</body>
</html>
